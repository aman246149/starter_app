name: starter_app

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  semantic-pull-request:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/semantic_pull_request.yml@v1

  build:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/flutter_package.yml@v1
    with:
      flutter_version: "3.38.7"
      coverage_excludes: "**/*.freezed.dart **/*.g.dart **/l10n/*.dart **/generated/*.dart"

  spell-check:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/spell_check.yml@v1
    with:
      includes: |
        **/*.md
      modified_files_only: false

  # Coverage badge auto-update
  coverage-badge:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.7"
          channel: stable
          cache: true
      
      - name: Install Very Good CLI
        run: dart pub global activate very_good_cli
      
      - name: Install dependencies
        run: very_good packages get
      
      - name: Run tests with coverage
        run: very_good test --coverage
      
      - name: Generate coverage badge
        uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          path: coverage/lcov.info
          min_coverage: 100
      
      - name: Update coverage badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: fe81c0405c3ee75b70c1f6b07996d74a
          filename: coverage_badge.json
          label: coverage
          message: 100%
          color: brightgreen
