name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Check formatting
        run: dart format --set-exit-if-changed lib test

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Very Good CLI
        run: dart pub global activate very_good_cli

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run all tests (Unit, Widget, Property-Based, Benchmark)
        run: very_good test --coverage --no-optimization

      - name: Check coverage
        run: |
          COVERAGE=$(lcov --summary coverage/lcov.info 2>&1 | grep "lines" | grep -oE "[0-9]+\.[0-9]+%" | head -1)
          echo "Coverage: $COVERAGE"
          # Fail if coverage drops below 100%
          if [[ "$COVERAGE" != "100.0%" ]]; then
            echo "::error::Coverage dropped below 100%! Current: $COVERAGE"
            exit 1
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage/lcov.info
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  golden-tests:
    name: Golden Tests
    runs-on: macos-latest  # macOS for consistent font rendering
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run golden tests
        run: flutter test test/goldens/ test/core/presentation/widgets/

      - name: Upload golden failures
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: golden-failures
          path: "**/failures/*.png"

  build:
    name: Build
    needs: [analyze, test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [apk, web]
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build ${{ matrix.target }}
        run: |
          if [ "${{ matrix.target }}" == "apk" ]; then
            flutter build apk --release --flavor production --target lib/main_production.dart
          else
            flutter build web --release
          fi
